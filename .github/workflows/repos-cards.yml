name: Update Pinned Repos
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-pinned-repos:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    name: Update pinned repositories cards
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Generate repo cards
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: python .github/scripts/generate_repo_cards.py

      - name: Commit pinned repos
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update pinned repos cards" || exit 0
          git push